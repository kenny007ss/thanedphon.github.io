<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanedphon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121212;
    --ink: #F2F1EE;
    --muted: #8F8D88;
    --line: #2A2A28;
    --card: #1A1A19;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Sarabun', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
  }

  .stage{
    width:100%;
    max-width: 380px;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
  }

  .profile{
    text-align:center;
    margin-bottom: 34px;
  }

  .avatar{
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Sans Thai', sans-serif;
    font-weight:600;
    font-size: 22px;
  }

  h1{
    font-family:'Noto Sans Thai', sans-serif;
    font-weight:600;
    font-size: 20px;
    margin: 0 0 6px;
    color: var(--ink);
  }

  .profile p{
    margin:0;
    font-size: 13.5px;
    color: var(--muted);
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }

  .link-btn:hover{
    border-color: var(--ink);
    background: #1F1F1D;
    transform: translateY(-1px);
  }

  .link-btn .ico{
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .link-btn b{
    font-size: 14.5px;
    font-weight: 500;
    flex: 1;
  }

  .link-btn .arrow{
    color: var(--muted);
    font-size: 15px;
  }

  .footer{
    text-align:center;
    margin-top: 30px;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .stage{ animation:none; opacity:1; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="profile">
      <div class="avatar">ธพ</div>
      <h1>ธเนศพล</h1>
      <p>ยินดีต้อนรับ กดลิงก์ด้านล่างได้เลย</p>
    </div>

    <div class="links">
      <a class="link-btn" href="https://www.instagram.com/ktz_xn/" target="_blank" rel="noopener">
        <span class="ico">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="6" stroke="#F2F1EE" stroke-width="1.6"/><circle cx="12" cy="12" r="4.2" stroke="#F2F1EE" stroke-width="1.6"/><circle cx="17.4" cy="6.6" r="1.1" fill="#F2F1EE"/></svg>
        </span>
        <b>Instagram</b>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn" href="https://www.facebook.com/Kenny007ss" target="_blank" rel="noopener">
        <span class="ico">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M13.5 22v-8.6h2.9l.4-3.4h-3.3V7.8c0-1 .3-1.7 1.7-1.7h1.8V3.1C16.7 3 15.6 3 14.4 3c-2.6 0-4.4 1.6-4.4 4.5v2.5H7v3.4h3v8.6h3.5z" stroke="#F2F1EE" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </span>
        <b>Facebook</b>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn" href="https://github.com/kenny007ss" target="_blank" rel="noopener">
        <span class="ico">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.4-3.4-1.4-.4-1.2-1.1-1.5-1.1-1.5-1-.6.1-.6.1-.6 1.1.1 1.6 1.1 1.6 1.1.9 1.6 2.5 1.2 3.1.9.1-.7.4-1.2.6-1.5-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.3.1-2.8 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 4.9 0c1.9-1.3 2.7-1 2.7-1 .6 1.5.2 2.5.1 2.8.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2z" stroke="#F2F1EE" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </span>
        <b>GitHub</b>
        <span class="arrow">→</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener">
        <span class="ico">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.5 2 2 5.9 2 10.7c0 3 1.9 5.7 4.8 7.3-.2.8-.8 2.7-.9 3.1 0 0-.1.4.2.5.2.1.5 0 .5 0 .7-.1 3-2 4.2-2.9.7.1 1.5.2 2.2.2 5.5 0 10-3.9 10-8.7C23 5.9 18.5 2 12 2z" stroke="#F2F1EE" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </span>
        <b>Line</b>
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="footer">thanedphon.github.io</div>
  </div>
</body>
</html>
